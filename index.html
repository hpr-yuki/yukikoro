<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>雪玉ごろごろ</title>
<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden;
    background: #9fc7e8;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
    font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
  }
  canvas { display: block; }
  #hud {
    position: fixed; top: 0; left: 0; width: 100%;
    padding: 10px 14px; box-sizing: border-box;
    color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    display: flex; justify-content: space-between; font-size: 15px;
    pointer-events: none; z-index: 5;
  }
  #barWrap {
    position: fixed; top: 44px; left: 10px; right: 10px;
    height: 10px; background: rgba(255,255,255,0.3); border-radius: 6px;
    overflow: hidden; z-index: 5;
  }
  #bar {
    height: 100%; width: 0%; background: linear-gradient(90deg,#7fd8ff,#ffffff);
    transition: width 0.1s linear;
  }
  #overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    background: rgba(20,40,70,0.72); color: #fff; z-index: 10;
    padding: 20px; box-sizing: border-box;
  }
  #overlay h1 { font-size: 30px; margin: 0 0 10px; }
  #overlay p { font-size: 16px; line-height: 1.6; margin: 6px 0; max-width: 320px; }
  #overlay .big { font-size: 44px; margin: 10px 0; }
  #overlay button, #startBtn {
    margin-top: 18px; padding: 12px 30px; font-size: 17px; border: none;
    border-radius: 30px; background: #ffdd55; color: #333; font-weight: bold;
    box-shadow: 0 4px 0 #d9b420; cursor: pointer;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
  <div>距離: <span id="distTxt">0</span> / <span id="goalTxt">0</span> m</div>
  <div>雪玉サイズ: <span id="sizeTxt">0</span> cm</div>
</div>
<div id="barWrap"><div id="bar"></div></div>

<div id="overlay">
  <h1>⛄ 雪玉ころころ</h1>
  <p>画面の左右をタップして雪玉を転がそう。<br>
  木や岩にぶつかると雪玉が小さくなるよ。<br>
  ゴールまでたどり着いて、大きな雪玉を目指せ！</p>
  <button id="startBtn">タップしてスタート</button>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const distTxt = document.getElementById('distTxt');
  const goalTxt = document.getElementById('goalTxt');
  const sizeTxt = document.getElementById('sizeTxt');
  const bar = document.getElementById('bar');

  let W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- ゲーム設定 ----------
  const LANES = 5;
  const GOAL_DISTANCE = 4500;   // ゴールまでの距離(単位)
  const START_RADIUS = 18;
  const MIN_RADIUS = 9;
  const MAX_RADIUS = 95;
  const GROWTH_COEF = 0.021;    // 距離に応じた成長率
  const HIT_SHRINK = 0.72;      // 衝突時の縮小率
  const INVULN_TIME = 1.0;      // 衝突後の無敵時間(秒)

  let state = 'start'; // start | playing | win | lose
  let distance = 0;
  let baseSpeed = 260;   // px/sec 相当のスクロール速度
  let scrollSpeed = baseSpeed;
  let player, obstacles, snowParticles;
  let spawnTimer = 0;
  let invuln = 0;
  let shake = 0;
  let lastTime = 0;

  function laneWidth() { return W / LANES; }
  function laneCenterX(lane) { return laneWidth() * (lane + 0.5); }

  function resetGame() {
    distance = 0;
    scrollSpeed = baseSpeed;
    obstacles = [];
    spawnTimer = 0.6;
    invuln = 0;
    shake = 0;
    player = {
      lane: Math.floor(LANES / 2),
      x: laneCenterX(Math.floor(LANES / 2)),
      y: 0,
      radius: START_RADIUS,
      rot: 0
    };
    player.y = H * 0.78;
    snowParticles = [];
    for (let i = 0; i < 90; i++) {
      snowParticles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: 1 + Math.random() * 2.5,
        speed: 40 + Math.random() * 90,
        drift: (Math.random() - 0.5) * 30
      });
    }
    goalTxt.textContent = GOAL_DISTANCE;
  }

  // ---------- 障害物 ----------
  function spawnObstacle() {
    const lane = Math.floor(Math.random() * LANES);
    const type = Math.random() < 0.5 ? 'tree' : 'rock';
    const size = type === 'tree' ? (50 + Math.random() * 20) : (40 + Math.random() * 22);
    obstacles.push({
      lane, type, size,
      x: laneCenterX(lane),
      y: -size * 2,
      hit: false,
      alpha: 1
    });
  }

  function difficultySpawnInterval() {
    const t = Math.min(distance / GOAL_DISTANCE, 1);
    return Math.max(0.55, 1.4 - t * 0.9);
  }

  // ---------- 描画 ----------
  function drawBackground(dt) {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#bfe0f7');
    grad.addColorStop(1, '#eaf6ff');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // 雪
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    for (const p of snowParticles) {
      if (state === 'playing' || state === 'start') {
        p.y += p.speed * dt;
        p.x += p.drift * dt;
        if (p.y > H) { p.y = -5; p.x = Math.random() * W; }
        if (p.x < 0) p.x = W;
        if (p.x > W) p.x = 0;
      }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawTree(x, y, size, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#6b4a2b';
    ctx.fillRect(x - size * 0.08, y + size * 0.35, size * 0.16, size * 0.35);
    ctx.fillStyle = '#2f7a4d';
    for (let i = 0; i < 3; i++) {
      const w = size * (1 - i * 0.22);
      const yy = y + size * 0.35 - i * size * 0.32;
      ctx.beginPath();
      ctx.moveTo(x, yy - size * 0.42);
      ctx.lineTo(x - w * 0.5, yy);
      ctx.lineTo(x + w * 0.5, yy);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function drawRock(x, y, size, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#8a8f96';
    ctx.beginPath();
    ctx.moveTo(x - size * 0.5, y + size * 0.3);
    ctx.lineTo(x - size * 0.3, y - size * 0.35);
    ctx.lineTo(x + size * 0.15, y - size * 0.45);
    ctx.lineTo(x + size * 0.5, y - size * 0.05);
    ctx.lineTo(x + size * 0.4, y + size * 0.35);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.ellipse(x - size * 0.1, y - size * 0.2, size * 0.22, size * 0.1, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawSnowball() {
    const p = player;
    const flashing = invuln > 0 && Math.floor(invuln * 10) % 2 === 0;
    ctx.save();
    if (flashing) ctx.globalAlpha = 0.45;
    const g = ctx.createRadialGradient(
      p.x - p.radius * 0.3, p.y - p.radius * 0.3, p.radius * 0.1,
      p.x, p.y, p.radius
    );
    g.addColorStop(0, '#ffffff');
    g.addColorStop(1, '#d7e9f5');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(150,170,190,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();
    // 質感の斑点
    ctx.fillStyle = 'rgba(180,200,215,0.5)';
    for (let i = 0; i < 5; i++) {
      const a = p.rot + i * (Math.PI * 2 / 5);
      const dx = Math.cos(a) * p.radius * 0.55;
      const dy = Math.sin(a) * p.radius * 0.55;
      ctx.beginPath();
      ctx.arc(p.x + dx, p.y + dy, p.radius * 0.12, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ---------- 更新 ----------
  function update(dt) {
    // レーンへ滑らかに移動
    const targetX = laneCenterX(player.lane);
    player.x += (targetX - player.x) * Math.min(1, dt * 10);
    player.rot += dt * (scrollSpeed / 40);

    if (invuln > 0) invuln -= dt;
    if (shake > 0) shake -= dt;

    // 距離とスピード
    scrollSpeed = baseSpeed + Math.min(distance / GOAL_DISTANCE, 1) * 220;
    const delta = scrollSpeed * dt;
    distance += delta;

    // 雪玉の成長(転がった分だけ大きくなる)
    player.radius = Math.min(MAX_RADIUS, player.radius + delta * GROWTH_COEF);

    // 障害物スポーン
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnObstacle();
      spawnTimer = difficultySpawnInterval();
    }

    // 障害物の移動と当たり判定
    for (const o of obstacles) {
      o.y += scrollSpeed * dt * 1.0;
      if (!o.hit && invuln <= 0) {
        const dx = o.x - player.x;
        const dy = o.y - player.y;
        const distC = Math.sqrt(dx * dx + dy * dy);
        const hitDist = player.radius * 0.85 + o.size * 0.38;
        if (distC < hitDist) {
          o.hit = true;
          player.radius = Math.max(MIN_RADIUS - 3, player.radius * HIT_SHRINK);
          invuln = INVULN_TIME;
          shake = 0.25;
          if (player.radius < MIN_RADIUS) {
            endGame('lose');
            return;
          }
        }
      }
      if (o.hit) o.alpha -= dt * 3;
    }
    obstacles = obstacles.filter(o => o.y < H + 100 && o.alpha > 0);

    // HUD更新
    distTxt.textContent = Math.floor(distance);
    sizeTxt.textContent = Math.round(player.radius * 2);
    bar.style.width = Math.min(100, (distance / GOAL_DISTANCE) * 100) + '%';

    if (distance >= GOAL_DISTANCE) {
      endGame('win');
    }
  }

  function render(dt) {
    ctx.save();
    if (shake > 0) {
      ctx.translate((Math.random() - 0.5) * 10 * shake / 0.25, (Math.random() - 0.5) * 10 * shake / 0.25);
    }
    drawBackground(dt);
    for (const o of obstacles) {
      if (o.type === 'tree') drawTree(o.x, o.y, o.size, o.alpha);
      else drawRock(o.x, o.y, o.size, o.alpha);
    }
    if (state === 'playing') drawSnowball();
    ctx.restore();
  }

  // ---------- ゲームフロー ----------
  function startGame() {
    resetGame();
    state = 'playing';
    overlay.classList.add('hidden');
  }

  function endGame(result) {
    state = result;
    setTimeout(() => showOverlay(result), 250);
  }

  function showOverlay(result) {
    overlay.innerHTML = '';
    const h1 = document.createElement('h1');
    const p1 = document.createElement('p');
    const bigDiv = document.createElement('div');
    bigDiv.className = 'big';
    const p2 = document.createElement('p');
    const btn = document.createElement('button');
    btn.textContent = 'もう一度あそぶ';

    if (result === 'win') {
      const score = Math.round(player.radius * 12);
      h1.textContent = '🏁 ゴール！';
      p1.textContent = 'みごとゴールまで転がりきった！';
      bigDiv.textContent = 'スコア: ' + score;
      p2.textContent = '雪玉の大きさ: 直径 ' + Math.round(player.radius * 2) + ' cm';
    } else if (result === 'lose') {
      h1.textContent = '💧 とけてしまった…';
      p1.textContent = 'ぶつかりすぎて雪玉が小さくなりすぎた！';
      bigDiv.textContent = '距離: ' + Math.floor(distance) + ' m';
      p2.textContent = 'もう一度挑戦してみよう。';
    }

    overlay.appendChild(h1);
    overlay.appendChild(p1);
    overlay.appendChild(bigDiv);
    overlay.appendChild(p2);
    overlay.appendChild(btn);
    overlay.classList.remove('hidden');
    btn.addEventListener('click', startGame);
  }

  document.getElementById('startBtn').addEventListener('click', startGame);

  // ---------- 入力 ----------
  function handleTap(clientX) {
    if (state !== 'playing') return;
    if (clientX < W / 2) {
      player.lane = Math.max(0, player.lane - 1);
    } else {
      player.lane = Math.min(LANES - 1, player.lane + 1);
    }
  }
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    handleTap(e.touches[0].clientX);
  }, { passive: false });
  canvas.addEventListener('click', (e) => {
    handleTap(e.clientX);
  });

  // ---------- メインループ ----------
  function loop(ts) {
    if (!lastTime) lastTime = ts;
    let dt = (ts - lastTime) / 1000;
    dt = Math.min(dt, 0.05);
    lastTime = ts;

    if (state === 'playing') update(dt);
    render(dt);

    requestAnimationFrame(loop);
  }

  resetGame();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
